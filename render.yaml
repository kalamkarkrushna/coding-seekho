services:
  - type: web
    name: coding-seekho-backend
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: java-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: IMAGE_UPLOAD_DIR
        value: /tmp/images
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  - type: web
    name: coding-seekho-frontend
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_URL
        value: https://coding-seekho-backend.onrender.com
